name: AMR Weekly Update
on:
  schedule:
  - cron: '0 4 * * 5'  # Every Friday at 04:00 UTC (07:00 Moscow)(-15 min / +1 hour)
env:
  tg_channel_id: ${{ secrets.TG_CHANNEL_ID }}
  tg_logger_id: ${{ secrets.TG_LOGGER_ID }}
  tg_token: ${{ secrets.TG_TOKEN }}
  ym_token: ${{ secrets.YM_TOKEN }}
  zv_token: ${{ secrets.ZV_TOKEN }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14.0"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f 'Python Scripts/requirements.txt' ]; then pip install -r 'Python Scripts/requirements.txt'; fi
        
    - name: Execute LookApp script
      run: python 'Python Scripts/AMR_LookApp.py'
      
    - name: Execute NewReleases script
      run: python 'Python Scripts/AMR_NewReleases.py'

    - name: Commit files
      id: git_commit
      run: |
        git config --local user.email "mushroomoff@mail.ru"
        git config --local user.name "MushroomOFF"
        git add -A
        if [ -z "$(git status --porcelain)" ]; then
          echo "No changes to commit, skip."
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          git commit -a -m "AMR autoupdate (LookApp + NewReleases)"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Push changes
      if: steps.git_commit.outputs.has_changes == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
